    }
    .flex-container::before {
      content: '';
      position: absolute;
      inset: 0;
      background-color: #00b3f0;
      opacity: 20%;
    }
    
  </style>
</head>

      db.createObjectStore('test', {keyPath: 'id'})
    }
  })
</script>

</body>
</html>
