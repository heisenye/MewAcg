<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
  <style>
    .container {
      position: relative;
      width: 500px;
      height: 200px;
      background-color: #00b3f0;
      display: grid;
      grid-template-rows: repeat(2, 1fr);
      grid-template-columns: repeat(4,1fr);
      grid-auto-rows: 0;
      overflow: hidden;
    }

    .child {
      background-color: pink;
    }

  </style>
</head>
<body>

<div class="container">
  <div class="child">1</div>
  <div class="child">1</div>
  <div class="child">1</div>
  <div class="child">1</div>
  <div class="child">1</div>
  <div class="child">1</div>
  <div class="child">1</div>
  <div class="child">1</div>
  <div class="child">1</div>
</div>

</body>
</html>
